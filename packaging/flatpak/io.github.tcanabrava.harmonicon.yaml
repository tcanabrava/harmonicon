# Flatpak manifest for harmonicon.
#
# Local build + install:
#   flatpak install -y flathub org.freedesktop.Platform//24.08 \
#       org.freedesktop.Sdk//24.08 org.freedesktop.Sdk.Extension.rust-stable//24.08
#   flatpak-builder --user --install --force-clean build-dir \
#       packaging/flatpak/io.github.tcanabrava.harmonicon.yaml
#   flatpak run io.github.tcanabrava.harmonicon
#
# This manifest fetches crates from the network at build time (fine for local
# builds). For an offline / Flathub build, vendor the dependencies — see
# packaging/flatpak/README.md.
id: io.github.tcanabrava.harmonicon
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: harmonicon

finish-args:
  # Windowing + GPU (Bevy / wgpu).
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri
  # Audio output and microphone input (pitch detection records from the mic).
  - --socket=pulseaudio
  # Joystick/gamepad input (bevy_gilrs) — planned screen navigation. Without
  # this, gilrs can't reach /dev/input to enumerate controllers and logs an
  # error at startup (harmless today, but blocks the feature once it's built).
  - --device=input
  # User-added songs and themes: dropped into ~/Harmonicon, read as an extra
  # asset root alongside the bundled ones (see the "external" AssetSource in
  # main.rs). Scoped to this one subfolder, not the whole home directory.
  - --filesystem=~/Harmonicon:create

modules:
  # Module 1: Compiles the Rust binary. Cached once done!
  - name: harmonicon-binary
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin
      env:
        CARGO_HOME: /run/build/harmonicon/cargo
      build-args:
        - --share=network
    build-commands:
      - rm -f .cargo/config.toml
      - cargo build --release --bin harmonicon
      - install -Dm755 target/release/harmonicon /app/bin/harmonicon.bin
    sources:
      - type: dir
        path: ../..
        only-arches: []
        # `assets` is NOT skipped here: a few asset files are baked into the
        # binary at compile time via include_bytes!/include_str! (e.g. the
        # bundled font, song schema JSON), so cargo needs them present even
        # though the full assets tree is copied again at runtime by the
        # harmonicon-metadata module below.
        #
        # `target`, `target-flatpak`, `build-dir` and `.flatpak-builder` ARE
        # skipped: they're build-output/cache directories that mutate on every
        # build. Left unskipped, each successful build changes this source
        # dir's content hash, which invalidates flatpak-builder's own module
        # cache for the next run — every invocation would recompile from
        # scratch even with no source changes.
        skip: [ "packaging", ".git", "target", "target-flatpak", "build-dir", ".flatpak-builder" ]

  # Module 2: Handles metadata and assets. Fast and rebuilds instantly!
  - name: harmonicon-metadata
    buildsystem: simple
    build-commands:
      - install -Dm755 packaging/flatpak/harmonicon.sh /app/bin/harmonicon
      # Game data
      - mkdir -p /app/share/harmonicon
      - cp -r assets /app/share/harmonicon/
      - find /app/share/harmonicon/assets -name '*~' -delete
      # Desktop integration (Fixed icon path)
      - install -Dm644 packaging/flatpak/io.github.tcanabrava.harmonicon.desktop -t /app/share/applications
      - install -Dm644 packaging/flatpak/io.github.tcanabrava.harmonicon.metainfo.xml -t /app/share/metainfo
      # 512x512 raster icon: `scalable` is for SVG only and flatpak's icon
      # validator caps raster icons at 512x512, so this goes in the matching
      # fixed-size hicolor directory instead.
      - install -Dm644 packaging/flatpak/io.github.tcanabrava.harmonicon.png /app/share/icons/hicolor/512x512/apps/io.github.tcanabrava.harmonicon.png
    sources:
      - type: dir
        path: ../..
        skip: [ "target", "target-flatpak", "build-dir", ".flatpak-builder" ]
